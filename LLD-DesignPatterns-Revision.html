# Low-Level Design (LLD) Patterns — Quick Revision Book

> A fast, interview-ready reference for **SOLID principles** and all **23 Gang of Four (GoF) design patterns**.
> Every pattern includes: **Intent**, **When to use**, a **UML class diagram (Mermaid)**, a compact **C# example**, and **key points**.

> Tip: Use the sidebar to jump between patterns, the search box to filter, and the copy button to grab any C# snippet.

---

## 1. SOLID Principles

The foundation that every pattern builds on. Remember: **S O L I D**.

```mermaid
mindmap
  root((SOLID))
    S - Single Responsibility
      One reason to change
    O - Open/Closed
      Open for extension, closed for modification
    L - Liskov Substitution
      Subtypes replace base types safely
    I - Interface Segregation
      Many small interfaces > one fat interface
    D - Dependency Inversion
      Depend on abstractions, not concretions
```

### S — Single Responsibility Principle (SRP)
A class should have **only one reason to change**.

```csharp
// BAD: report generation + persistence in one class
// GOOD: split responsibilities
public class Report { public string Title { get; set; } public string Body { get; set; } }

public class ReportFormatter { public string ToHtml(Report r) => $"<h1>{r.Title}</h1><p>{r.Body}</p>"; }

public class ReportSaver { public void Save(string content, string path) => File.WriteAllText(path, content); }
```

### O — Open/Closed Principle (OCP)
Software entities should be **open for extension, closed for modification**.

```csharp
public abstract class Discount { public abstract decimal Apply(decimal price); }
public class NoDiscount   : Discount { public override decimal Apply(decimal p) => p; }
public class TenPercent   : Discount { public override decimal Apply(decimal p) => p * 0.9m; }
// Add new discounts by creating new classes — no edits to existing ones.
```

### L — Liskov Substitution Principle (LSP)
Subtypes must be **substitutable** for their base types without breaking behavior.

```csharp
public abstract class Bird { public abstract void Eat(); }
public interface IFlyingBird { void Fly(); }
public class Sparrow : Bird, IFlyingBird { public override void Eat() {} public void Fly() {} }
public class Ostrich : Bird { public override void Eat() {} } // not forced to Fly()
```

### I — Interface Segregation Principle (ISP)
Clients should not be forced to depend on methods they **don't use**.

```csharp
// BAD: IMachine { Print(); Scan(); Fax(); }
public interface IPrinter { void Print(); }
public interface IScanner { void Scan(); }
public class SimplePrinter : IPrinter { public void Print() {} } // no Scan/Fax burden
```

### D — Dependency Inversion Principle (DIP)
High-level modules should depend on **abstractions**, not on concrete details.

```csharp
public interface IMessageSender { void Send(string msg); }
public class EmailSender : IMessageSender { public void Send(string msg) {} }

public class Notification
{
    private readonly IMessageSender _sender;          // depends on abstraction
    public Notification(IMessageSender sender) => _sender = sender; // injected
    public void Alert(string msg) => _sender.Send(msg);
}
```

---

## 2. Creational Patterns

Concerned with **object creation** — making systems independent of how objects are created and composed.

### 2.1 Singleton

**Intent:** Ensure a class has **only one instance** and provide a global access point to it.

**When to use:** Shared resources — configuration, logging, caches, connection pools.

```mermaid
classDiagram
    class Singleton {
        -static Lazy~Singleton~ _instance
        -Singleton()
        +static Singleton Instance
        +DoWork() void
    }
    Singleton ..> Singleton : creates & holds one
```

```csharp
public sealed class Logger
{
    // Thread-safe + lazy initialization
    private static readonly Lazy<Logger> _instance = new(() => new Logger());
    public static Logger Instance => _instance.Value;

    private Logger() { }                                  // private ctor blocks `new`
    public void Log(string msg) => Console.WriteLine($"[LOG] {msg}");
}

// Usage
Logger.Instance.Log("App started");
```

**Key points:** Use `Lazy<T>` for thread safety. Beware: hides dependencies, hard to unit test, can become a global-state anti-pattern. Prefer DI containers (registered as singleton lifetime) in modern apps.

---

### 2.2 Factory Method

**Intent:** Define an interface for creating an object, but let **subclasses decide** which class to instantiate.

**When to use:** A class can't anticipate the type of objects it must create; you want to delegate instantiation to subclasses.

```mermaid
classDiagram
    class IProduct { <<interface>> +Operation() string }
    class ConcreteA { +Operation() string }
    class ConcreteB { +Operation() string }
    class Creator { <<abstract>> +FactoryMethod() IProduct +SomeOperation() string }
    class CreatorA { +FactoryMethod() IProduct }
    class CreatorB { +FactoryMethod() IProduct }
    IProduct <|.. ConcreteA
    IProduct <|.. ConcreteB
    Creator <|-- CreatorA
    Creator <|-- CreatorB
    CreatorA ..> ConcreteA : creates
    CreatorB ..> ConcreteB : creates
```

```csharp
public interface ITransport { string Deliver(); }
public class Truck : ITransport { public string Deliver() => "Deliver by land"; }
public class Ship  : ITransport { public string Deliver() => "Deliver by sea"; }

public abstract class Logistics
{
    public abstract ITransport CreateTransport();        // the factory method
    public string PlanDelivery() => CreateTransport().Deliver();
}

public class RoadLogistics : Logistics { public override ITransport CreateTransport() => new Truck(); }
public class SeaLogistics  : Logistics { public override ITransport CreateTransport() => new Ship();  }

// Usage
Logistics logistics = new RoadLogistics();
Console.WriteLine(logistics.PlanDelivery());             // Deliver by land
```

**Key points:** Decouples creation from usage. Adds subclasses but follows OCP. Different from "simple factory" (a single method with a switch).

---

### 2.3 Abstract Factory

**Intent:** Provide an interface for creating **families of related objects** without specifying their concrete classes.

**When to use:** You need product families that must be used together and be consistent (e.g., UI themes, cross-platform widgets).

```mermaid
classDiagram
    class IGuiFactory { <<interface>> +CreateButton() IButton +CreateCheckbox() ICheckbox }
    class WinFactory { +CreateButton() IButton +CreateCheckbox() ICheckbox }
    class MacFactory { +CreateButton() IButton +CreateCheckbox() ICheckbox }
    class IButton { <<interface>> +Render() }
    class ICheckbox { <<interface>> +Render() }
    IGuiFactory <|.. WinFactory
    IGuiFactory <|.. MacFactory
    IButton <|.. WinButton
    IButton <|.. MacButton
    ICheckbox <|.. WinCheckbox
    ICheckbox <|.. MacCheckbox
    WinFactory ..> WinButton
    WinFactory ..> WinCheckbox
    MacFactory ..> MacButton
    MacFactory ..> MacCheckbox
```

```csharp
public interface IButton   { string Render(); }
public interface ICheckbox { string Render(); }

public class WinButton   : IButton   { public string Render() => "Windows button"; }
public class MacButton   : IButton   { public string Render() => "Mac button"; }
public class WinCheckbox : ICheckbox { public string Render() => "Windows checkbox"; }
public class MacCheckbox : ICheckbox { public string Render() => "Mac checkbox"; }

public interface IGuiFactory { IButton CreateButton(); ICheckbox CreateCheckbox(); }
public class WinFactory : IGuiFactory { public IButton CreateButton() => new WinButton(); public ICheckbox CreateCheckbox() => new WinCheckbox(); }
public class MacFactory : IGuiFactory { public IButton CreateButton() => new MacButton(); public ICheckbox CreateCheckbox() => new MacCheckbox(); }

// Usage — client stays platform-agnostic
IGuiFactory factory = OperatingSystem.IsWindows() ? new WinFactory() : new MacFactory();
Console.WriteLine(factory.CreateButton().Render());
```

**Key points:** Guarantees consistent product families. Adding a new product type means changing every factory. Factory Method = one product; Abstract Factory = family of products.

---

### 2.4 Builder

**Intent:** Separate the **construction** of a complex object from its **representation**, so the same process can create different representations.

**When to use:** Objects with many optional parameters, step-by-step construction, immutable objects (avoids telescoping constructors).

```mermaid
classDiagram
    class Burger { +Bun +Patty +Cheese +Sauces }
    class BurgerBuilder {
        +SetBun(b) BurgerBuilder
        +AddPatty(p) BurgerBuilder
        +AddCheese() BurgerBuilder
        +Build() Burger
    }
    BurgerBuilder ..> Burger : builds
```

```csharp
public class Burger
{
    public string Bun { get; init; } = "regular";
    public string Patty { get; init; } = "beef";
    public bool Cheese { get; init; }
    public override string ToString() => $"{Bun} bun, {Patty} patty, cheese={Cheese}";
}

public class BurgerBuilder
{
    private string _bun = "regular", _patty = "beef"; private bool _cheese;
    public BurgerBuilder SetBun(string bun)   { _bun = bun; return this; }    // fluent
    public BurgerBuilder AddPatty(string p)   { _patty = p; return this; }
    public BurgerBuilder AddCheese()          { _cheese = true; return this; }
    public Burger Build() => new() { Bun = _bun, Patty = _patty, Cheese = _cheese };
}

// Usage — fluent chaining
var burger = new BurgerBuilder().SetBun("sesame").AddPatty("chicken").AddCheese().Build();
```

**Key points:** Fluent API is the common C# style. A *Director* (optional) can encapsulate construction recipes. Great for immutable objects with `init` setters.

### 2.5 Prototype

**Intent:** Create new objects by **cloning** an existing instance (the prototype) instead of constructing from scratch.

**When to use:** Object creation is expensive; you want copies of pre-configured objects.

```mermaid
classDiagram
    class IPrototype~T~ { <<interface>> +Clone() T }
    class Shape { +X +Y +Color +Clone() Shape }
    class Circle { +Radius +Clone() Shape }
    IPrototype <|.. Shape
    Shape <|-- Circle
```

```csharp
public interface IPrototype<T> { T Clone(); }

public class Document : IPrototype<Document>
{
    public string Title { get; set; } = "";
    public List<string> Pages { get; set; } = new();

    public Document Clone() => new()
    {
        Title = Title,
        Pages = new List<string>(Pages)                  // deep copy of the list
    };
}

// Usage
var template = new Document { Title = "Invoice", Pages = { "Header", "Footer" } };
var copy = template.Clone();
copy.Title = "Invoice #42";                              // original unaffected
```

**Key points:** Distinguish **shallow** vs **deep** copy. C# `MemberwiseClone()` gives a shallow copy. Avoids subclass explosion of factories.

---

## 3. Structural Patterns

Concerned with how classes and objects are **composed** to form larger structures.

### 3.1 Adapter

**Intent:** Convert the interface of a class into another interface clients expect. Lets incompatible interfaces **work together**.

**When to use:** Integrating a legacy/third-party class whose interface doesn't match your code.

```mermaid
classDiagram
    class ITarget { <<interface>> +Request() string }
    class Adaptee { +SpecificRequest() string }
    class Adapter { -Adaptee _adaptee +Request() string }
    ITarget <|.. Adapter
    Adapter o--> Adaptee
```

```csharp
public interface ITarget { string Request(); }          // what client expects

public class LegacyPrinter                               // adaptee (incompatible)
{
    public string PrintInOldFormat() => "Legacy output";
}

public class PrinterAdapter : ITarget
{
    private readonly LegacyPrinter _legacy;
    public PrinterAdapter(LegacyPrinter legacy) => _legacy = legacy;
    public string Request() => _legacy.PrintInOldFormat(); // translate the call
}

// Usage
ITarget target = new PrinterAdapter(new LegacyPrinter());
Console.WriteLine(target.Request());
```

**Key points:** Object adapter (composition, shown) is preferred over class adapter (inheritance) in C#. Wraps, doesn't change, the adaptee.

---

### 3.2 Bridge

**Intent:** **Decouple an abstraction from its implementation** so the two can vary independently.

**When to use:** You have orthogonal dimensions (e.g., shape × rendering API) and want to avoid a Cartesian explosion of subclasses.

```mermaid
classDiagram
    class Shape { <<abstract>> #IRenderer renderer +Draw() }
    class Circle { +Draw() }
    class Square { +Draw() }
    class IRenderer { <<interface>> +RenderShape(name) string }
    class VectorRenderer { +RenderShape(name) string }
    class RasterRenderer { +RenderShape(name) string }
    Shape <|-- Circle
    Shape <|-- Square
    Shape o--> IRenderer
    IRenderer <|.. VectorRenderer
    IRenderer <|.. RasterRenderer
```

```csharp
public interface IRenderer { string RenderShape(string name); }       // implementation side
public class VectorRenderer : IRenderer { public string RenderShape(string n) => $"Vector {n}"; }
public class RasterRenderer : IRenderer { public string RenderShape(string n) => $"Raster {n}"; }

public abstract class Shape                                           // abstraction side
{
    protected readonly IRenderer Renderer;
    protected Shape(IRenderer renderer) => Renderer = renderer;       // the "bridge"
    public abstract string Draw();
}
public class Circle : Shape { public Circle(IRenderer r) : base(r) {} public override string Draw() => Renderer.RenderShape("circle"); }

// Usage — mix any shape with any renderer
Console.WriteLine(new Circle(new VectorRenderer()).Draw());           // Vector circle
```

**Key points:** "Prefer composition over inheritance" in action. Bridge is designed up front; Adapter is applied after the fact.

---

### 3.3 Composite

**Intent:** Compose objects into **tree structures** and treat individual objects and compositions **uniformly**.

**When to use:** Part-whole hierarchies — file systems, UI trees, org charts, menus.

```mermaid
classDiagram
    class IComponent { <<interface>> +Display(indent) }
    class Leaf { +Display(indent) }
    class Composite { -children +Add(c) +Display(indent) }
    IComponent <|.. Leaf
    IComponent <|.. Composite
    Composite o--> IComponent : children
```

```csharp
public interface IFileSystemItem { int Size(); }

public class FileItem : IFileSystemItem                  // leaf
{
    private readonly int _size;
    public FileItem(int size) => _size = size;
    public int Size() => _size;
}

public class Folder : IFileSystemItem                    // composite
{
    private readonly List<IFileSystemItem> _items = new();
    public void Add(IFileSystemItem item) => _items.Add(item);
    public int Size() => _items.Sum(i => i.Size());      // recurses uniformly
}

// Usage
var root = new Folder();
root.Add(new FileItem(100));
var sub = new Folder(); sub.Add(new FileItem(50)); root.Add(sub);
Console.WriteLine(root.Size());                          // 150
```

**Key points:** Client treats leaf and composite the same. Recursion lives in the composite. Trade-off: a too-general interface can make leaves expose meaningless methods.

---

### 3.4 Decorator

**Intent:** Attach **additional responsibilities** to an object dynamically. A flexible alternative to subclassing.

**When to use:** Add/remove behavior at runtime; combine features in many permutations (e.g., coffee + milk + sugar).

```mermaid
classDiagram
    class ICoffee { <<interface>> +Cost() decimal +Desc() string }
    class SimpleCoffee { +Cost() decimal +Desc() string }
    class CoffeeDecorator { <<abstract>> #ICoffee inner }
    class MilkDecorator { +Cost() decimal +Desc() string }
    class SugarDecorator { +Cost() decimal +Desc() string }
    ICoffee <|.. SimpleCoffee
    ICoffee <|.. CoffeeDecorator
    CoffeeDecorator <|-- MilkDecorator
    CoffeeDecorator <|-- SugarDecorator
    CoffeeDecorator o--> ICoffee : wraps
```

```csharp
public interface ICoffee { decimal Cost(); string Desc(); }
public class SimpleCoffee : ICoffee { public decimal Cost() => 2m; public string Desc() => "Coffee"; }

public abstract class CoffeeDecorator : ICoffee
{
    protected readonly ICoffee Inner;
    protected CoffeeDecorator(ICoffee inner) => Inner = inner;
    public abstract decimal Cost();
    public abstract string Desc();
}
public class Milk  : CoffeeDecorator { public Milk(ICoffee c):base(c){} public override decimal Cost()=>Inner.Cost()+0.5m; public override string Desc()=>Inner.Desc()+" + milk"; }
public class Sugar : CoffeeDecorator { public Sugar(ICoffee c):base(c){} public override decimal Cost()=>Inner.Cost()+0.2m; public override string Desc()=>Inner.Desc()+" + sugar"; }

// Usage — stack decorators
ICoffee order = new Sugar(new Milk(new SimpleCoffee()));
Console.WriteLine($"{order.Desc()} = {order.Cost():C}");  // Coffee + milk + sugar = $2.70
```

**Key points:** Wraps an object of the same interface. Order can matter. C# Streams (`BufferedStream`, `GZipStream`) are real-world decorators.

---

### 3.5 Facade

**Intent:** Provide a **unified, simplified interface** to a complex subsystem.

**When to use:** Hide complexity, provide an easy entry point, decouple clients from many subsystem classes.

```mermaid
classDiagram
    class OrderFacade { +PlaceOrder(item) string }
    class Inventory { +Check(item) bool }
    class Payment { +Charge(amt) bool }
    class Shipping { +Ship(item) string }
    OrderFacade --> Inventory
    OrderFacade --> Payment
    OrderFacade --> Shipping
```

```csharp
public class Inventory { public bool Check(string item) => true; }
public class Payment   { public bool Charge(decimal amt) => true; }
public class Shipping  { public string Ship(string item) => $"Shipped {item}"; }

public class OrderFacade                                  // one simple entry point
{
    private readonly Inventory _inv = new();
    private readonly Payment _pay = new();
    private readonly Shipping _ship = new();

    public string PlaceOrder(string item, decimal price)
    {
        if (!_inv.Check(item)) return "Out of stock";
        if (!_pay.Charge(price)) return "Payment failed";
        return _ship.Ship(item);
    }
}

// Usage
Console.WriteLine(new OrderFacade().PlaceOrder("Book", 20m));
```

**Key points:** Reduces coupling; doesn't hide the subsystem (clients can still use it directly). Different from Adapter (changes interface) — Facade *simplifies* it.

---

### 3.6 Flyweight

**Intent:** Use **sharing** to support large numbers of fine-grained objects efficiently by separating **intrinsic** (shared) from **extrinsic** (context) state.

**When to use:** Huge numbers of similar objects blow up memory (e.g., characters in a document, trees in a game, particles).

```mermaid
classDiagram
    class TreeType { +Name +Color +Draw(x,y) }
    class TreeFactory { -pool +GetType(name,color) TreeType }
    class Forest { +PlantTree(x,y,name,color) }
    TreeFactory o--> TreeType : shares
    Forest --> TreeFactory
```

```csharp
public class TreeType                                    // intrinsic (shared) state
{
    public string Name { get; }
    public string Color { get; }
    public TreeType(string name, string color) { Name = name; Color = color; }
    public string Draw(int x, int y) => $"{Name}/{Color} at ({x},{y})";
}

public class TreeFactory                                  // ensures sharing
{
    private readonly Dictionary<string, TreeType> _pool = new();
    public TreeType GetTreeType(string name, string color)
    {
        var key = $"{name}_{color}";
        if (!_pool.TryGetValue(key, out var t)) _pool[key] = t = new TreeType(name, color);
        return t;                                         // reuse existing flyweight
    }
}

// Usage — 1000 trees share a handful of TreeType objects
var factory = new TreeFactory();
var oak = factory.GetTreeType("Oak", "Green");           // extrinsic x,y passed at draw
Console.WriteLine(oak.Draw(10, 20));
```

**Key points:** Intrinsic state is shared and immutable; extrinsic state is passed in by the client. Pure optimization pattern — only use when memory is a real constraint.

---

### 3.7 Proxy

**Intent:** Provide a **surrogate or placeholder** for another object to control access to it.

**When to use:** Lazy loading (virtual proxy), access control (protection proxy), remote objects (remote proxy), caching/logging.

```mermaid
classDiagram
    class IImage { <<interface>> +Display() }
    class RealImage { +Display() }
    class ProxyImage { -RealImage real -filename +Display() }
    IImage <|.. RealImage
    IImage <|.. ProxyImage
    ProxyImage o--> RealImage : lazy-creates
```

```csharp
public interface IImage { void Display(); }

public class RealImage : IImage                           // expensive to create
{
    private readonly string _file;
    public RealImage(string file) { _file = file; Console.WriteLine($"Loading {file}"); }
    public void Display() => Console.WriteLine($"Display {_file}");
}

public class ProxyImage : IImage                          // controls access / lazy loads
{
    private readonly string _file;
    private RealImage? _real;
    public ProxyImage(string file) => _file = file;
    public void Display()
    {
        _real ??= new RealImage(_file);                   // created only on first use
        _real.Display();
    }
}

// Usage — image loaded only when first displayed
IImage img = new ProxyImage("photo.png");
img.Display();
```

**Key points:** Same interface as the real subject (unlike Decorator which adds behavior). Variants: virtual, protection, remote, smart-reference, caching proxy.

---

## 4. Behavioral Patterns

Concerned with **algorithms and the assignment of responsibilities** between objects — how they communicate.

### 4.1 Chain of Responsibility

**Intent:** Pass a request along a **chain of handlers**; each decides to process it or pass it on.

**When to use:** Multiple objects may handle a request and the handler isn't known in advance (e.g., logging levels, approval workflows, middleware).

```mermaid
classDiagram
    class Handler { <<abstract>> #Handler next +SetNext(h) Handler +Handle(req) }
    class InfoHandler { +Handle(req) }
    class WarnHandler { +Handle(req) }
    class ErrorHandler { +Handle(req) }
    Handler <|-- InfoHandler
    Handler <|-- WarnHandler
    Handler <|-- ErrorHandler
    Handler o--> Handler : next
```

```csharp
public enum Level { Info, Warning, Error }

public abstract class Handler
{
    private Handler? _next;
    public Handler SetNext(Handler next) { _next = next; return next; }
    public virtual void Handle(Level level, string msg)
    {
        if (_next != null) _next.Handle(level, msg);     // pass along
    }
}

public class InfoHandler : Handler
{
    public override void Handle(Level level, string msg)
    {
        if (level == Level.Info) Console.WriteLine($"INFO: {msg}");
        else base.Handle(level, msg);
    }
}
public class ErrorHandler : Handler
{
    public override void Handle(Level level, string msg)
    {
        if (level == Level.Error) Console.WriteLine($"ERROR: {msg}");
        else base.Handle(level, msg);
    }
}

// Usage
var chain = new InfoHandler();
chain.SetNext(new ErrorHandler());
chain.Handle(Level.Error, "Disk full");                  // handled by ErrorHandler
```

**Key points:** Decouples sender from receiver. A request may go unhandled. ASP.NET Core middleware pipeline is a real-world chain.

---

### 4.2 Command

**Intent:** Encapsulate a **request as an object**, allowing parameterization, queuing, logging, and **undo**.

**When to use:** Undo/redo, transactional behavior, task queues, GUI buttons/menu actions.

```mermaid
classDiagram
    class ICommand { <<interface>> +Execute() +Undo() }
    class LightOnCommand { +Execute() +Undo() }
    class Light { +On() +Off() }
    class RemoteControl { -ICommand cmd +Press() }
    ICommand <|.. LightOnCommand
    LightOnCommand --> Light : receiver
    RemoteControl o--> ICommand
```

```csharp
public interface ICommand { void Execute(); void Undo(); }

public class Light { public void On() => Console.WriteLine("On"); public void Off() => Console.WriteLine("Off"); }

public class LightOnCommand : ICommand                    // concrete command
{
    private readonly Light _light;
    public LightOnCommand(Light light) => _light = light;
    public void Execute() => _light.On();
    public void Undo() => _light.Off();
}

public class RemoteControl                                // invoker
{
    private ICommand? _last;
    public void Submit(ICommand cmd) { cmd.Execute(); _last = cmd; }
    public void UndoLast() => _last?.Undo();
}

// Usage
var remote = new RemoteControl();
remote.Submit(new LightOnCommand(new Light()));          // On
remote.UndoLast();                                        // Off
```

**Key points:** Receiver does the work, command stores it as an object. Enables undo stacks and macro commands (composite of commands).

---

### 4.3 Iterator

**Intent:** Provide a way to access elements of a collection **sequentially** without exposing its underlying representation.

**When to use:** Traverse custom collections uniformly; support multiple traversal strategies.

```mermaid
classDiagram
    class IEnumerable~T~ { <<interface>> +GetEnumerator() IEnumerator }
    class IEnumerator~T~ { <<interface>> +MoveNext() bool +Current T }
    class NameCollection { +GetEnumerator() }
    IEnumerable <|.. NameCollection
```

```csharp
// C# has first-class iterator support via IEnumerable<T> + yield
public class NameRepository : IEnumerable<string>
{
    private readonly string[] _names = { "Ann", "Bob", "Cara" };

    public IEnumerator<string> GetEnumerator()
    {
        foreach (var name in _names)
            yield return name;                            // compiler builds the iterator
    }
    System.Collections.IEnumerator System.Collections.IEnumerable.GetEnumerator() => GetEnumerator();
}

// Usage
foreach (var name in new NameRepository())
    Console.WriteLine(name);
```

**Key points:** In C#, prefer `IEnumerable<T>` + `yield return` instead of hand-rolling. `foreach` is the consumer. Decouples iteration logic from the collection.

---

### 4.4 Mediator

**Intent:** Define an object that **encapsulates how a set of objects interact**, promoting loose coupling by keeping them from referring to each other directly.

**When to use:** Many-to-many object communication becomes a tangled mess (e.g., chat rooms, air traffic control, complex dialog forms).

```mermaid
classDiagram
    class IChatMediator { <<interface>> +Send(msg, user) +Register(user) }
    class ChatRoom { +Send(msg, user) +Register(user) }
    class User { -IChatMediator mediator +Send(msg) +Receive(msg) }
    IChatMediator <|.. ChatRoom
    ChatRoom o--> User : coordinates
    User --> IChatMediator
```

```csharp
public interface IChatMediator { void Send(string msg, User sender); void Register(User u); }

public class ChatRoom : IChatMediator
{
    private readonly List<User> _users = new();
    public void Register(User u) => _users.Add(u);
    public void Send(string msg, User sender)
    {
        foreach (var u in _users.Where(u => u != sender))
            u.Receive(msg);                               // mediator routes messages
    }
}

public class User
{
    private readonly IChatMediator _mediator;
    public string Name { get; }
    public User(string name, IChatMediator m) { Name = name; _mediator = m; m.Register(this); }
    public void Send(string msg) => _mediator.Send($"{Name}: {msg}", this);
    public void Receive(string msg) => Console.WriteLine(msg);
}

// Usage
var room = new ChatRoom();
var ann = new User("Ann", room);
var bob = new User("Bob", room);
ann.Send("Hi!");                                          // Bob receives "Ann: Hi!"
```

**Key points:** Centralizes control; users only know the mediator. Risk: the mediator can become a "god object" if overloaded.

---

### 4.5 Memento

**Intent:** Capture and externalize an object's **internal state** without violating encapsulation, so it can be **restored** later.

**When to use:** Undo/rollback, snapshots, checkpoints.

```mermaid
classDiagram
    class Editor { -content +Save() Memento +Restore(m) }
    class Memento { +State }
    class History { -mementos +Push(m) +Pop() Memento }
    Editor ..> Memento : creates
    History o--> Memento : stores
```

```csharp
public class EditorMemento                                // memento (immutable snapshot)
{
    public string State { get; }
    public EditorMemento(string state) => State = state;
}

public class Editor                                       // originator
{
    public string Content { get; set; } = "";
    public EditorMemento Save() => new(Content);
    public void Restore(EditorMemento m) => Content = m.State;
}

public class History                                      // caretaker
{
    private readonly Stack<EditorMemento> _stack = new();
    public void Push(EditorMemento m) => _stack.Push(m);
    public EditorMemento Pop() => _stack.Pop();
}

// Usage
var editor = new Editor { Content = "v1" };
var history = new History();
history.Push(editor.Save());                              // snapshot v1
editor.Content = "v2";
editor.Restore(history.Pop());                            // back to v1
```

**Key points:** Caretaker stores mementos but never inspects/changes them. Preserves encapsulation. Watch memory cost of many snapshots.

---

### 4.6 Observer

**Intent:** Define a **one-to-many** dependency so that when one object changes state, all its dependents are **notified automatically**.

**When to use:** Event systems, pub/sub, model-view updates, reactive UIs.

```mermaid
classDiagram
    class ISubject { +Attach(o) +Detach(o) +Notify() }
    class IObserver { <<interface>> +Update(data) }
    class WeatherStation { -observers +SetTemp(t) +Notify() }
    class PhoneDisplay { +Update(data) }
    ISubject <|.. WeatherStation
    IObserver <|.. PhoneDisplay
    WeatherStation o--> IObserver : notifies
```

```csharp
public interface IObserver { void Update(float temp); }

public class WeatherStation                               // subject
{
    private readonly List<IObserver> _observers = new();
    private float _temp;
    public void Attach(IObserver o) => _observers.Add(o);
    public void Detach(IObserver o) => _observers.Remove(o);
    public float Temp
    {
        get => _temp;
        set { _temp = value; Notify(); }                  // push update on change
    }
    private void Notify() { foreach (var o in _observers) o.Update(_temp); }
}

public class PhoneDisplay : IObserver
{
    public void Update(float temp) => Console.WriteLine($"Phone: {temp}°C");
}

// Usage
var station = new WeatherStation();
station.Attach(new PhoneDisplay());
station.Temp = 25;                                        // Phone: 25°C
```

**Key points:** In idiomatic C#, `event`/`Action`/`IObservable<T>` implement this. Beware memory leaks from un-detached observers.

---

### 4.7 State

**Intent:** Allow an object to **alter its behavior when its internal state changes** — it appears to change its class.

**When to use:** Object behavior depends on state and has many conditional `if/switch` blocks (e.g., order lifecycle, vending machine, TCP connection).

```mermaid
classDiagram
    class IState { <<interface>> +Handle(ctx) }
    class Context { -IState state +SetState(s) +Request() }
    class DraftState { +Handle(ctx) }
    class PublishedState { +Handle(ctx) }
    IState <|.. DraftState
    IState <|.. PublishedState
    Context o--> IState
```

```csharp
public interface IDocState { IDocState Publish(); string Name { get; } }

public class Draft : IDocState
{
    public string Name => "Draft";
    public IDocState Publish() { Console.WriteLine("Moving to Moderation"); return new Moderation(); }
}
public class Moderation : IDocState
{
    public string Name => "Moderation";
    public IDocState Publish() { Console.WriteLine("Now Published"); return new Published(); }
}
public class Published : IDocState
{
    public string Name => "Published";
    public IDocState Publish() { Console.WriteLine("Already published"); return this; }
}

public class Document
{
    private IDocState _state = new Draft();
    public void Publish() => _state = _state.Publish();   // delegates to state
    public string CurrentState => _state.Name;
}

// Usage
var doc = new Document();
doc.Publish();                                            // Draft -> Moderation
doc.Publish();                                            // Moderation -> Published
```

**Key points:** Replaces big conditionals with polymorphism. Similar structure to Strategy, but State transitions between states (often self-managed); Strategy is chosen by the client.

---

### 4.8 Strategy

**Intent:** Define a **family of interchangeable algorithms**, encapsulate each, and make them swappable at runtime.

**When to use:** Multiple ways to do one thing (sorting, payment, compression, pricing) chosen at runtime.

```mermaid
classDiagram
    class IPayStrategy { <<interface>> +Pay(amount) string }
    class CreditCard { +Pay(amount) string }
    class PayPal { +Pay(amount) string }
    class Checkout { -IPayStrategy strategy +SetStrategy(s) +Process(amt) }
    IPayStrategy <|.. CreditCard
    IPayStrategy <|.. PayPal
    Checkout o--> IPayStrategy
```

```csharp
public interface IPaymentStrategy { string Pay(decimal amount); }
public class CreditCardPayment : IPaymentStrategy { public string Pay(decimal a) => $"Paid {a:C} by card"; }
public class PayPalPayment     : IPaymentStrategy { public string Pay(decimal a) => $"Paid {a:C} via PayPal"; }

public class Checkout
{
    private IPaymentStrategy _strategy;
    public Checkout(IPaymentStrategy s) => _strategy = s;
    public void SetStrategy(IPaymentStrategy s) => _strategy = s;  // swap at runtime
    public string Process(decimal amount) => _strategy.Pay(amount);
}

// Usage
var checkout = new Checkout(new CreditCardPayment());
Console.WriteLine(checkout.Process(100m));
checkout.SetStrategy(new PayPalPayment());
Console.WriteLine(checkout.Process(50m));
```

**Key points:** Favors composition over inheritance. In C#, a `Func<>` delegate is often a lightweight strategy. Client picks the algorithm.

---

### 4.9 Template Method

**Intent:** Define the **skeleton of an algorithm** in a base class, deferring some steps to subclasses without changing the overall structure.

**When to use:** Several algorithms share the same steps in the same order but differ in some steps (e.g., data parsers, build pipelines).

```mermaid
classDiagram
    class DataProcessor { <<abstract>> +Process() #Read()* #Parse()* #Save() }
    class CsvProcessor { #Read() #Parse() }
    class XmlProcessor { #Read() #Parse() }
    DataProcessor <|-- CsvProcessor
    DataProcessor <|-- XmlProcessor
```

```csharp
public abstract class DataProcessor
{
    public void Process()                                 // template method (fixed order)
    {
        Read();
        Parse();
        Save();
    }
    protected abstract void Read();                       // steps subclasses must define
    protected abstract void Parse();
    protected virtual void Save() => Console.WriteLine("Saving to DB"); // optional hook
}

public class CsvProcessor : DataProcessor
{
    protected override void Read()  => Console.WriteLine("Read CSV");
    protected override void Parse() => Console.WriteLine("Parse CSV");
}

// Usage
new CsvProcessor().Process();                             // Read CSV / Parse CSV / Saving to DB
```

**Key points:** Uses inheritance (vs Strategy's composition). Base class controls the flow ("Hollywood Principle": don't call us, we'll call you). Provide `virtual` hooks for optional steps.

---

### 4.10 Visitor

**Intent:** Represent an **operation to be performed on elements of an object structure**, letting you add new operations without changing the element classes.

**When to use:** Stable class hierarchy but frequently-added operations (e.g., AST traversal, exporting documents to many formats).

```mermaid
classDiagram
    class IShape { <<interface>> +Accept(v) }
    class Circle { +Accept(v) +Radius }
    class Rectangle { +Accept(v) +W +H }
    class IVisitor { <<interface>> +Visit(Circle) +Visit(Rectangle) }
    class AreaVisitor { +Visit(Circle) +Visit(Rectangle) }
    IShape <|.. Circle
    IShape <|.. Rectangle
    IVisitor <|.. AreaVisitor
    Circle ..> IVisitor
    Rectangle ..> IVisitor
```

```csharp
public interface IShapeVisitor { void Visit(Circle c); void Visit(Rectangle r); }
public interface IShape { void Accept(IShapeVisitor v); }

public class Circle : IShape { public double Radius = 2; public void Accept(IShapeVisitor v) => v.Visit(this); }
public class Rectangle : IShape { public double W = 3, H = 4; public void Accept(IShapeVisitor v) => v.Visit(this); }

public class AreaVisitor : IShapeVisitor                  // new operation, no shape edits
{
    public void Visit(Circle c)    => Console.WriteLine($"Circle area: {Math.PI * c.Radius * c.Radius:F2}");
    public void Visit(Rectangle r) => Console.WriteLine($"Rect area: {r.W * r.H}");
}

// Usage
var shapes = new List<IShape> { new Circle(), new Rectangle() };
var visitor = new AreaVisitor();
foreach (var s in shapes) s.Accept(visitor);              // double dispatch
```

**Key points:** "Double dispatch" — `Accept` picks the element, the overload picks the operation. Easy to add operations, hard to add new element types.

---

### 4.11 Interpreter

**Intent:** Given a language, define a **grammar representation** and an **interpreter** that uses it to evaluate sentences in the language.

**When to use:** Simple, well-defined grammars — expression evaluators, rule engines, query/filter mini-languages.

```mermaid
classDiagram
    class IExpression { <<interface>> +Interpret() int }
    class NumberExpr { +Interpret() int }
    class AddExpr { -left -right +Interpret() int }
    class SubtractExpr { -left -right +Interpret() int }
    IExpression <|.. NumberExpr
    IExpression <|.. AddExpr
    IExpression <|.. SubtractExpr
    AddExpr o--> IExpression
    SubtractExpr o--> IExpression
```

```csharp
public interface IExpression { int Interpret(); }

public class Number : IExpression                         // terminal expression
{
    private readonly int _value;
    public Number(int value) => _value = value;
    public int Interpret() => _value;
}

public class Add : IExpression                            // non-terminal expression
{
    private readonly IExpression _l, _r;
    public Add(IExpression l, IExpression r) { _l = l; _r = r; }
    public int Interpret() => _l.Interpret() + _r.Interpret();
}
public class Subtract : IExpression
{
    private readonly IExpression _l, _r;
    public Subtract(IExpression l, IExpression r) { _l = l; _r = r; }
    public int Interpret() => _l.Interpret() - _r.Interpret();
}

// Usage — evaluates (5 + 3) - 2 = 6
IExpression expr = new Subtract(new Add(new Number(5), new Number(3)), new Number(2));
Console.WriteLine(expr.Interpret());                      // 6
```

**Key points:** Each grammar rule = a class. Fine for simple grammars; for complex ones use a real parser/parser-generator. Often paired with Composite (the expression tree).

## 5. Cheat Sheet Summary

### Pattern at-a-glance

| # | Pattern | Category | One-line purpose |
|---|---------|----------|------------------|
| 1 | **Singleton** | Creational | One instance, global access |
| 2 | **Factory Method** | Creational | Subclass decides which object to create |
| 3 | **Abstract Factory** | Creational | Create families of related objects |
| 4 | **Builder** | Creational | Build complex objects step by step |
| 5 | **Prototype** | Creational | Create objects by cloning |
| 6 | **Adapter** | Structural | Make incompatible interfaces work together |
| 7 | **Bridge** | Structural | Split abstraction from implementation |
| 8 | **Composite** | Structural | Treat tree of objects uniformly |
| 9 | **Decorator** | Structural | Add behavior dynamically by wrapping |
| 10 | **Facade** | Structural | Simple interface over a complex subsystem |
| 11 | **Flyweight** | Structural | Share objects to save memory |
| 12 | **Proxy** | Structural | Surrogate that controls access |
| 13 | **Chain of Responsibility** | Behavioral | Pass request along a chain of handlers |
| 14 | **Command** | Behavioral | Encapsulate a request as an object (undo) |
| 15 | **Iterator** | Behavioral | Sequentially access elements |
| 16 | **Mediator** | Behavioral | Centralize complex object interactions |
| 17 | **Memento** | Behavioral | Snapshot & restore state |
| 18 | **Observer** | Behavioral | Notify dependents of state changes |
| 19 | **State** | Behavioral | Change behavior when state changes |
| 20 | **Strategy** | Behavioral | Swap interchangeable algorithms |
| 21 | **Template Method** | Behavioral | Algorithm skeleton, subclasses fill steps |
| 22 | **Visitor** | Behavioral | Add operations without changing classes |
| 23 | **Interpreter** | Behavioral | Evaluate sentences of a grammar |

### Commonly confused pairs

| A vs B | Key difference |
|--------|----------------|
| **Factory Method** vs **Abstract Factory** | One product vs a *family* of products |
| **Adapter** vs **Bridge** | Adapter fixes incompatibility *after*; Bridge is designed *up front* |
| **Adapter** vs **Facade** | Adapter changes one interface; Facade simplifies a whole subsystem |
| **Decorator** vs **Proxy** | Decorator *adds* behavior; Proxy *controls access* (same interface) |
| **Strategy** vs **State** | Client picks Strategy; State transitions itself between states |
| **Strategy** vs **Template Method** | Strategy = composition (swap object); Template = inheritance (override step) |
| **Composite** vs **Decorator** | Composite = tree of many children; Decorator = one wrapped child + behavior |

### Quick selection guide

- **Need one shared instance?** → Singleton
- **Creating objects but want to hide the concrete type?** → Factory Method / Abstract Factory
- **Too many constructor parameters?** → Builder
- **Cloning is cheaper than building?** → Prototype
- **Two interfaces don't match?** → Adapter
- **Avoid subclass explosion across two dimensions?** → Bridge
- **Tree / part-whole hierarchy?** → Composite
- **Add features at runtime in combinations?** → Decorator
- **Tame a complicated subsystem?** → Facade
- **Millions of similar objects eating memory?** → Flyweight
- **Lazy load / guard / cache an object?** → Proxy
- **Several handlers might process a request?** → Chain of Responsibility
- **Need undo/redo or queued operations?** → Command
- **Custom collection traversal?** → Iterator
- **Objects communicate in a tangled mesh?** → Mediator
- **Snapshots / rollback?** → Memento
- **Publish/subscribe notifications?** → Observer
- **Big switch on a status field?** → State
- **Swappable algorithms?** → Strategy
- **Fixed steps, varying details?** → Template Method
- **Add operations to a stable hierarchy?** → Visitor
- **Evaluate a small custom language?** → Interpreter

<script>
(function () {
  "use strict";

  // ---------- Theme ----------
  var root = document.documentElement;
  var savedTheme = localStorage.getItem("lld-theme") || "dark";
  root.setAttribute("data-theme", savedTheme);

  function mermaidTheme() {
    return root.getAttribute("data-theme") === "light" ? "default" : "dark";
  }
  function hljsThemeHref() {
    return root.getAttribute("data-theme") === "light"
      ? "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"
      : "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css";
  }

  var hljsLink = document.createElement("link");
  hljsLink.rel = "stylesheet";
  hljsLink.href = hljsThemeHref();
  document.head.appendChild(hljsLink);

  // ---------- Slugify (GitHub-style, matches existing anchors) ----------
  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/[^\w\s-]/g, "")
      .replace(/\s+/g, "-");
  }

  // ---------- Render markdown ----------
  var md = document.getElementById("markdown-source").textContent;
  marked.setOptions({ gfm: true, breaks: false });
  var html = marked.parse(md);

  var content = document.getElementById("content");
  content.innerHTML = html;

  // Assign heading ids
  content.querySelectorAll("h1, h2, h3, h4").forEach(function (h) {
    if (!h.id) h.id = slugify(h.textContent);
  });

  // ---------- Mermaid blocks ----------
  mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "loose" });

  content.querySelectorAll("pre code.language-mermaid").forEach(function (code) {
    var card = document.createElement("div");
    card.className = "mermaid-card";
    var label = document.createElement("span");
    label.className = "diagram-label";
    label.textContent = "UML Diagram";
    var diagram = document.createElement("div");
    diagram.className = "mermaid";
    diagram.textContent = code.textContent;
    diagram.dataset.src = code.textContent;              // keep original for re-render
    card.appendChild(label);
    card.appendChild(diagram);
    var pre = code.closest("pre");
    pre.parentNode.replaceChild(card, pre);
  });

  // ---------- C# / other code blocks: highlight + copy button ----------
  content.querySelectorAll("pre code").forEach(function (code) {
    var pre = code.closest("pre");
    var langClass = (code.className.match(/language-(\w+)/) || [])[1] || "text";
    var label = langClass === "csharp" ? "C#" : langClass.toUpperCase();

    try {
      if (langClass && hljs.getLanguage(langClass)) {
        code.innerHTML = hljs.highlight(code.textContent, { language: langClass }).value;
      } else {
        hljs.highlightElement(code);
      }
    } catch (e) { /* leave as-is */ }

    var wrap = document.createElement("div");
    wrap.className = "code-wrap";
    var head = document.createElement("div");
    head.className = "code-head";
    head.innerHTML = '<span class="lang-tag"><span class="dot"></span>' + label + "</span>";
    var btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", function () {
      navigator.clipboard.writeText(code.textContent).then(function () {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(function () { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
      });
    });
    head.appendChild(btn);

    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(head);
    wrap.appendChild(pre);
  });

  // ---------- Hide the in-document title duplicate is fine; build sidebar TOC ----------
  var toc = document.getElementById("toc");
  var headings = content.querySelectorAll("h2, h3");
  var tocItems = [];
  headings.forEach(function (h) {
    var li = document.createElement("li");
    li.className = h.tagName === "H2" ? "lvl-2" : "lvl-3";
    var a = document.createElement("a");
    a.href = "#" + h.id;
    a.textContent = h.textContent;
    a.dataset.target = h.id;
    li.appendChild(a);
    toc.appendChild(li);
    tocItems.push({ li: li, a: a, id: h.id, text: h.textContent.toLowerCase() });
  });

  // Render mermaid after layout
  mermaid.run({ querySelector: ".mermaid" }).catch(function (e) { console.warn(e); });

  // ---------- Search ----------
  var searchInput = document.getElementById("searchInput");
  searchInput.addEventListener("input", function () {
    var q = this.value.trim().toLowerCase();
    tocItems.forEach(function (item) {
      var match = !q || item.text.indexOf(q) !== -1;
      item.li.classList.toggle("hidden", !match);
    });
  });

  // ---------- Scroll-spy ----------
  var idToItem = {};
  tocItems.forEach(function (it) { idToItem[it.id] = it; });

  var spy = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        tocItems.forEach(function (it) { it.a.classList.remove("active"); });
        var item = idToItem[entry.target.id];
        if (item) {
          item.a.classList.add("active");
          item.a.scrollIntoView({ block: "nearest" });
        }
      }
    });
  }, { rootMargin: "-70px 0px -70% 0px", threshold: 0 });

  headings.forEach(function (h) { spy.observe(h); });

  // ---------- Mobile sidebar ----------
  var sidebar = document.getElementById("sidebar");
  var scrim = document.getElementById("scrim");
  function closeSidebar() { sidebar.classList.remove("open"); scrim.classList.remove("show"); }
  document.getElementById("menuBtn").addEventListener("click", function () {
    sidebar.classList.toggle("open");
    scrim.classList.toggle("show");
  });
  scrim.addEventListener("click", closeSidebar);
  toc.addEventListener("click", function (e) {
    if (e.target.tagName === "A" && window.innerWidth <= 900) closeSidebar();
  });

  // ---------- Theme toggle ----------
  document.getElementById("themeBtn").addEventListener("click", function () {
    var next = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", next);
    localStorage.setItem("lld-theme", next);
    hljsLink.href = hljsThemeHref();
    // Re-render mermaid with new theme
    content.querySelectorAll(".mermaid").forEach(function (el) {
      el.removeAttribute("data-processed");
      el.innerHTML = el.dataset.src || el.textContent;
    });
    mermaid.initialize({ startOnLoad: false, theme: mermaidTheme(), securityLevel: "loose" });
    mermaid.run({ querySelector: ".mermaid" }).catch(function (e) { console.warn(e); });
  });

  // ---------- Back to top ----------
  var toTop = document.getElementById("toTop");
  window.addEventListener("scroll", function () {
    toTop.classList.toggle("show", window.scrollY > 600);
  });
  toTop.addEventListener("click", function () { window.scrollTo({ top: 0, behavior: "smooth" }); });
})();
</script>
